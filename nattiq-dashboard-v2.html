<style>
:root{
  --teal:#2fa8bc;--teal-d:#1a7d8f;--teal-bg:#eaf7fa;--teal-mid:#c2eaf0;
  --ink:#181818;--ink2:#3d3d3d;--ink3:#7a7a7a;--ink4:#b0b0b0;
  --border:#d4d4d4;--border2:#ebebeb;
  --paper:#fff;--paper2:#f7f7f5;--paper3:#f0f0ed;
  --green:#1a7a3a;--green-bg:#eaf5ed;
  --red:#c0392b;--red-bg:#fdf0ee;
  --amber:#b7650a;--amber-bg:#fdf4e3;
  --blue:#1a5fa8;--blue-bg:#e8f0fb;
  --r:6px;--mono:'IBM Plex Mono',monospace;--body:'Inter',sans-serif;--cond:'Inter Tight',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--body);color:var(--ink);background:var(--paper2);}
body{display:flex;flex-direction:column;}

/* ── HEADER ── */
.hdr{
  background:#111;border-bottom:3px solid var(--teal);
  padding:0 20px;height:52px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;z-index:100;
  position:sticky;top:0;
}
.hdr-left{display:flex;align-items:center;gap:14px;}
.hdr-logo img{height:30px;display:block;}
.hdr-sep{width:1px;height:24px;background:rgba(255,255,255,0.15);}
.hdr-title{font-family:var(--cond);font-size:14px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.6);}
.hdr-right{display:flex;gap:8px;}
.hdr-btn{
  font-size:13px;font-weight:600;font-family:var(--body);
  border:1.5px solid rgba(255,255,255,0.2);border-radius:var(--r);
  padding:6px 14px;background:transparent;color:rgba(255,255,255,0.75);cursor:pointer;
  transition:all 0.15s;white-space:nowrap;
}
.hdr-btn:hover{background:rgba(255,255,255,0.08);color:#fff;}
.hdr-btn.primary{background:var(--teal);border-color:var(--teal);color:#fff;}
.hdr-btn.primary:hover{background:var(--teal-d);}

/* ── BODY LAYOUT ── */
.body-wrap{display:flex;flex:1;overflow:hidden;}

/* ── LEFT SIDEBAR ── */
.sidebar{
  width:220px;flex-shrink:0;background:#fff;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;
}
.sidebar-hdr{
  padding:14px 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border2);
}
.sidebar-title{font-family:var(--cond);font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink3);}
.new-folder-btn{
  width:24px;height:24px;border:1.5px solid var(--border);border-radius:4px;
  background:var(--paper2);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--ink3);
  transition:all 0.15s;
}
.new-folder-btn:hover{background:var(--teal-bg);border-color:var(--teal);color:var(--teal-d);}

.folder-list{padding:8px 0;flex:1;}
.folder-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;cursor:pointer;
  transition:background 0.12s;position:relative;
  border-left:3px solid transparent;
}
.folder-item:hover{background:var(--paper2);}
.folder-item.active{background:var(--teal-bg);border-left-color:var(--teal);}
.folder-icon{font-size:14px;flex-shrink:0;}
.folder-name{font-size:13px;font-weight:500;color:var(--ink2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.folder-item.active .folder-name{color:var(--teal-d);font-weight:600;}
.folder-count{
  font-family:var(--mono);font-size:10px;
  background:var(--paper3);color:var(--ink3);
  padding:2px 6px;border-radius:10px;flex-shrink:0;
}
.folder-item.active .folder-count{background:var(--teal-mid);color:var(--teal-d);}
.folder-drag-over{background:var(--teal-bg)!important;border-left-color:var(--teal)!important;}

.folder-actions{display:none;gap:2px;}
.folder-item:hover .folder-actions{display:flex;}
.folder-action-btn{
  width:20px;height:20px;border:none;background:transparent;
  font-size:11px;cursor:pointer;color:var(--ink3);border-radius:3px;
  display:flex;align-items:center;justify-content:center;
}
.folder-action-btn:hover{background:var(--paper3);color:var(--ink);}

/* ── MAIN CONTENT ── */
.main{flex:1;overflow-y:auto;padding:20px;}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 18px;}
.stat-n{font-family:var(--mono);font-size:26px;font-weight:500;color:var(--ink);line-height:1;}
.stat-l{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink3);margin-top:5px;}
.stat.hl .stat-n{color:var(--teal-d);}

/* Section header */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-title{font-family:var(--cond);font-size:18px;font-weight:700;color:var(--ink);}
.sec-right{display:flex;gap:8px;align-items:center;}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.view-btn{padding:5px 10px;border:none;background:#fff;cursor:pointer;font-size:13px;color:var(--ink3);transition:all 0.1s;}
.view-btn.active{background:var(--teal);color:#fff;}

/* Project grid */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.projects-list-view{display:flex;flex-direction:column;gap:8px;}

/* Project card */
.proj-card{
  background:#fff;border:1px solid var(--border);border-radius:10px;
  overflow:hidden;transition:box-shadow 0.15s,transform 0.15s;
  cursor:grab;position:relative;
}
.proj-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);}
.proj-card.dragging{opacity:0.5;transform:scale(0.98);}
.proj-card-top{padding:14px 16px 10px;}
.proj-card-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;}
.proj-name{font-size:15px;font-weight:700;color:var(--ink);line-height:1.3;}
.proj-status-badge{
  font-family:var(--mono);font-size:9px;font-weight:600;
  padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:0.06em;
  flex-shrink:0;margin-top:2px;
}
.badge-pending{background:var(--amber-bg);color:var(--amber);}
.badge-submitted{background:var(--green-bg);color:var(--green);}
.proj-meta{font-family:var(--mono);font-size:10px;color:var(--ink3);line-height:1.6;}

/* Project actions */
.proj-actions{
  display:flex;gap:6px;padding:10px 16px;
  border-top:1px solid var(--border2);background:var(--paper2);
  flex-wrap:wrap;
}
.pact{
  font-size:12px;font-weight:600;font-family:var(--body);
  border:1.5px solid var(--border);border-radius:var(--r);
  padding:5px 10px;background:#fff;color:var(--ink2);
  cursor:pointer;transition:all 0.12s;display:flex;align-items:center;gap:4px;
  white-space:nowrap;
}
.pact:hover{border-color:var(--teal);color:var(--teal-d);background:var(--teal-bg);}
.pact.danger:hover{border-color:var(--red);color:var(--red);background:var(--red-bg);}

/* List view card */
.proj-card-list{
  background:#fff;border:1px solid var(--border);border-radius:8px;
  display:grid;grid-template-columns:1fr auto;align-items:center;
  padding:12px 16px;gap:12px;cursor:grab;transition:box-shadow 0.15s;
}
.proj-card-list:hover{box-shadow:0 2px 8px rgba(0,0,0,0.07);}
.proj-card-list.dragging{opacity:0.5;}
.pcl-left{display:flex;flex-direction:column;gap:3px;}
.pcl-name{font-size:14px;font-weight:700;color:var(--ink);}
.pcl-meta{font-family:var(--mono);font-size:10px;color:var(--ink3);}
.pcl-right{display:flex;gap:6px;align-items:center;}

/* Empty folder */
.empty-folder{
  padding:60px 20px;text-align:center;color:var(--ink3);
  border:2px dashed var(--border);border-radius:12px;
  background:#fff;
}
.empty-folder-icon{font-size:40px;opacity:0.2;margin-bottom:10px;}

/* ── MODALS ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;align-items:center;justify-content:center;padding:20px;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:12px;width:100%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,0.25);overflow:hidden;}
.modal-hdr{background:#111;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:var(--cond);font-size:17px;font-weight:700;color:#fff;letter-spacing:0.04em;}
.modal-close{background:none;border:none;color:rgba(255,255,255,0.5);font-size:20px;cursor:pointer;}
.modal-body{padding:22px;display:flex;flex-direction:column;gap:14px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field-label{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink3);}
.field-input{font-family:var(--body);font-size:14px;border:1.5px solid var(--border);border-radius:var(--r);padding:10px 13px;outline:none;transition:border-color 0.15s;color:var(--ink);}
.field-input:focus{border-color:var(--teal);}
.field-input::placeholder{color:#bbb;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border2);display:flex;gap:8px;justify-content:flex-end;}
.btn-cancel{background:transparent;border:1.5px solid var(--border);border-radius:var(--r);padding:9px 18px;font-family:var(--body);font-size:13px;cursor:pointer;color:var(--ink2);}
.btn-primary{background:var(--teal);border:none;border-radius:var(--r);padding:9px 20px;font-family:var(--cond);font-size:14px;font-weight:700;cursor:pointer;color:#fff;letter-spacing:0.04em;}
.btn-danger{background:var(--red);border:none;border-radius:var(--r);padding:9px 20px;font-family:var(--cond);font-size:14px;font-weight:700;cursor:pointer;color:#fff;}

/* View inventory modal */
.inv-modal{max-width:900px;}
.inv-table{width:100%;border-collapse:collapse;font-size:13px;}
.inv-table th{font-family:var(--cond);font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;background:var(--teal-bg);color:var(--teal-d);border:1px solid var(--teal-mid);padding:9px 12px;text-align:center;}
.inv-table th:first-child{text-align:left;}
.inv-table td{border:1px solid var(--border);padding:9px 12px;vertical-align:middle;text-align:center;background:#fff;}
.inv-table tr:nth-child(even) td{background:var(--paper2);}
.inv-table td:first-child{text-align:left;font-weight:600;font-size:14px;}
.method-sel{font-family:var(--body);font-size:12px;font-weight:500;border:1.5px solid var(--border);border-radius:var(--r);background:var(--paper2);color:var(--ink3);padding:5px 8px;width:110px;outline:none;cursor:pointer;-webkit-appearance:none;transition:all 0.15s;}
.method-sel.m-reuse{background:#eaf5ed;border-color:#1a7a3a;color:#1a7a3a;}
.method-sel.m-dispose{background:#fdf0ee;border-color:#c0392b;color:#c0392b;}
.method-sel.m-donate{background:#e8f0fb;border-color:#1a5fa8;color:#1a5fa8;}
.method-sel.m-store{background:#fdf4e3;border-color:#b7650a;color:#b7650a;}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:var(--r);font-family:var(--mono);font-size:12px;opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap;z-index:999;border-left:3px solid var(--teal);}
.toast.show{opacity:1;}
.toast.err{border-left-color:var(--red);}

/* Spinner */
.spin-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:400;align-items:center;justify-content:center;}
.spin-ov.show{display:flex;}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.2);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Folder rename input */
.folder-rename{font-family:var(--body);font-size:13px;border:1px solid var(--teal);border-radius:3px;padding:2px 6px;width:130px;outline:none;}

@media(max-width:768px){
  .sidebar{display:none;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .projects-grid{grid-template-columns:1fr;}
}
@media print{
  .hdr,.sidebar,.proj-actions,.pact,.hdr-btn,.modal-bg{display:none!important;}
  body{background:#fff;}
}
</style>
</head>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxUMku6OxFRrjSLq86Up6PlQ_hp6pqDb7lt3X1ieRZLPv61Qy067e6Jp8PwgfA-AjpSQQ/exec';
const FORM_BASE  = 'https://monishtest2-svg.github.io/nattiq/nattiq-v8.html';
const METHOD_MAP = {'Re-use':'reuse','Disposal':'dispose','Donate':'donate','Store':'store'};
const METHODS    = ['Re-use','Disposal','Donate','Store'];
const STORE_KEY  = 'nattiq_folders';

// ── STATE ────────────────────────────────────────────────────
let allProjects = [];
let allRows     = [];
let folders     = [];
let activeFolder = '__all__';
let viewMode    = 'grid';
let editingProject = null;
let deletingProject = null;
let currentViewProject = null;

// ── FOLDERS ──────────────────────────────────────────────────
function loadFolders() {
  const stored = localStorage.getItem(STORE_KEY);
  if (stored) {
    folders = JSON.parse(stored);
  } else {
    folders = [
      {id:'q1',name:'Q1 2026',icon:'📁'},
      {id:'q2',name:'Q2 2026',icon:'📁'},
      {id:'q3',name:'Q3 2026',icon:'📁'},
      {id:'q4',name:'Q4 2026',icon:'📁'},
      {id:'arch',name:'Archived',icon:'🗄'},
    ];
    saveFolders();
  }
}

function saveFolders() {
  localStorage.setItem(STORE_KEY, JSON.stringify(folders));
}

function renderFolders() {
  const list = document.getElementById('folderList');
  const allCount = allProjects.length;

  let html = `
    <div class="folder-item ${activeFolder==='__all__'?'active':''}"
      onclick="setFolder('__all__')"
      ondragover="event.preventDefault();this.classList.add('folder-drag-over')"
      ondragleave="this.classList.remove('folder-drag-over')"
      ondrop="dropToFolder(event,'__all__')">
      <span class="folder-icon">🏠</span>
      <span class="folder-name">All Projects</span>
      <span class="folder-count">${allCount}</span>
    </div>`;

  folders.forEach(f => {
    const count = allProjects.filter(p => (p.folder||'') === f.id).length;
    html += `
      <div class="folder-item ${activeFolder===f.id?'active':''}"
        id="folder_${f.id}"
        onclick="setFolder('${f.id}')"
        ondragover="event.preventDefault();this.classList.add('folder-drag-over')"
        ondragleave="this.classList.remove('folder-drag-over')"
        ondrop="dropToFolder(event,'${f.id}')">
        <span class="folder-icon">${f.icon}</span>
        <span class="folder-name" id="fname_${f.id}">${f.name}</span>
        <span class="folder-count">${count}</span>
        <div class="folder-actions">
          <button class="folder-action-btn" onclick="event.stopPropagation();renameFolder('${f.id}')" title="Rename">✏</button>
          <button class="folder-action-btn" onclick="event.stopPropagation();deleteFolder('${f.id}')" title="Delete">🗑</button>
        </div>
      </div>`;
  });

  list.innerHTML = html;
}

function setFolder(id) {
  activeFolder = id;
  renderFolders();
  renderProjects();
  const f = folders.find(x=>x.id===id);
  document.getElementById('secTitle').textContent = id==='__all__' ? 'All Projects' : (f?f.name:'Projects');
}

function createFolder() {
  const name = prompt('Folder name:');
  if (!name) return;
  const id = 'f_' + Date.now();
  folders.push({id, name, icon:'📁'});
  saveFolders();
  renderFolders();
  populateFolderSelect();
}

function renameFolder(id) {
  const f = folders.find(x=>x.id===id);
  if (!f) return;
  const name = prompt('New name:', f.name);
  if (!name) return;
  f.name = name;
  saveFolders();
  renderFolders();
  populateFolderSelect();
}

function deleteFolder(id) {
  if (!confirm('Delete this folder? Projects inside will move to All Projects.')) return;
  folders = folders.filter(x=>x.id!==id);
  allProjects.forEach(p => { if (p.folder===id) p.folder=''; });
  saveFolders();
  if (activeFolder===id) activeFolder='__all__';
  renderFolders();
  renderProjects();
  populateFolderSelect();
}

// ── DRAG & DROP ───────────────────────────────────────────────
let draggedProject = null;

function startDrag(event, projName) {
  draggedProject = projName;
  event.dataTransfer.effectAllowed = 'move';
  setTimeout(() => {
    const card = document.getElementById('pcard_' + projName.replace(/[^a-zA-Z0-9]/g,'_'));
    if (card) card.classList.add('dragging');
  }, 0);
}

function endDrag(projName) {
  const card = document.getElementById('pcard_' + projName.replace(/[^a-zA-Z0-9]/g,'_'));
  if (card) card.classList.remove('dragging');
  draggedProject = null;
  document.querySelectorAll('.folder-drag-over').forEach(el=>el.classList.remove('folder-drag-over'));
}

function dropToFolder(event, folderId) {
  event.preventDefault();
  document.querySelectorAll('.folder-drag-over').forEach(el=>el.classList.remove('folder-drag-over'));
  if (!draggedProject) return;
  const p = allProjects.find(x=>x.projectName===draggedProject);
  if (p) {
    p.folder = folderId === '__all__' ? '' : folderId;
    saveProjectFolders();
    renderFolders();
    renderProjects();
    showToast('Moved to ' + (folderId==='__all__'?'All Projects':(folders.find(f=>f.id===folderId)?.name||folderId)));
  }
  draggedProject = null;
}

function saveProjectFolders() {
  const map = {};
  allProjects.forEach(p => { map[p.projectName] = p.folder||''; });
  localStorage.setItem('nattiq_proj_folders', JSON.stringify(map));
}

function loadProjectFolders() {
  const stored = localStorage.getItem('nattiq_proj_folders');
  if (!stored) return;
  const map = JSON.parse(stored);
  allProjects.forEach(p => { p.folder = map[p.projectName] || ''; });
}

// ── LOAD DATA ─────────────────────────────────────────────────
async function loadData() {
  try {
    const [pRes, rRes] = await Promise.all([
      fetch(SCRIPT_URL + '?action=getProjects'),
      fetch(SCRIPT_URL + '?action=getData')
    ]);
    const pJson = await pRes.json();
    const rJson = await rRes.json();
    allProjects = pJson.projects || [];
    allRows     = rJson.rows     || [];
    loadProjectFolders();
    updateStats();
    renderFolders();
    renderProjects();
    populateFolderSelect();
    document.getElementById('sProjects').closest('.stat').querySelector('.stat-n').textContent = allProjects.length;
  } catch(err) {
    document.getElementById('projectsContainer').innerHTML =
      `<div class="empty-folder"><div class="empty-folder-icon">⚠</div><p style="color:var(--red)">${err.message}</p></div>`;
  }
}

function updateStats() {
  const total   = allRows.reduce((s,r)=>s+(parseInt(r.quantity)||0),0);
  const pending = allRows.filter(r=>!r.condition||r.condition==='').length;
  document.getElementById('sProjects').textContent = allProjects.length;
  document.getElementById('sItems').textContent    = total;
  document.getElementById('sTypes').textContent    = allRows.length;
  document.getElementById('sPending').textContent  = pending;
}

// ── RENDER PROJECTS ───────────────────────────────────────────
function renderProjects() {
  const container = document.getElementById('projectsContainer');
  let projects = activeFolder === '__all__'
    ? allProjects
    : allProjects.filter(p => (p.folder||'') === activeFolder);

  if (projects.length === 0) {
    container.innerHTML = `<div class="empty-folder">
      <div class="empty-folder-icon">📋</div>
      <p>${activeFolder==='__all__'?'No projects yet. Click <b>+ New Project</b> to create one.':'No projects in this folder. Drag projects here.'}</p>
    </div>`;
    return;
  }

  const rowsByProj = {};
  allRows.forEach(r => {
    if (!rowsByProj[r.projectName]) rowsByProj[r.projectName] = [];
    rowsByProj[r.projectName].push(r);
  });

  // Ensure all project names are strings
  projects = projects.map(p => ({...p, projectName: String(p.projectName||'Untitled')}));

  if (viewMode === 'grid') {
    container.className = 'projects-grid';
    container.innerHTML = projects.map(p => { try { return renderCardGrid(p, rowsByProj[p.projectName]||[]); } catch(e) { return ''; } }).join('');
  } else {
    container.className = 'projects-list-view';
    container.innerHTML = projects.map(p => { try { return renderCardList(p, rowsByProj[p.projectName]||[]); } catch(e) { return ''; } }).join('');
  }
}

function renderCardGrid(p, rows) {
  const qty     = rows.reduce((s,r)=>s+(parseInt(r.quantity)||0),0);
  const submitted = rows.length > 0;
  const dateStr = p.startDate ? new Date(p.startDate).toLocaleDateString('en-CA') : '—';
  const slug    = String(p.projectName||'').replace(/[^a-zA-Z0-9]/g,'_');
  return `
  <div class="proj-card" id="pcard_${slug}"
    draggable="true"
    ondragstart="startDrag(event,'${p.projectName.replace(/'/g,"\'")}')"
    ondragend="endDrag('${p.projectName.replace(/'/g,"\'")}')" >
    <div class="proj-card-top">
      <div class="proj-card-row1">
        <div class="proj-name">${p.projectName}</div>
        <div class="proj-status-badge ${submitted?'badge-submitted':'badge-pending'}">${submitted?'Submitted':'Pending'}</div>
      </div>
      <div class="proj-meta">
        ${p.location||'—'} · ${dateStr}<br>
        SC: ${p.scName||'—'} · ${qty} items
      </div>
    </div>
    <div class="proj-actions">
      <button class="pact" onclick="viewProject('${p.projectName.replace(/'/g,"\'")}')">👁 View</button>
      <button class="pact" onclick="editProject('${p.projectName.replace(/'/g,"\'")}')">✏ Edit</button>
      <button class="pact" onclick="copyLink('${p.projectName.replace(/'/g,"\'")}')">📋 Link</button>
      <button class="pact" onclick="exportCSV('${p.projectName.replace(/'/g,"\'")}')">📊 Excel</button>
      <button class="pact danger" onclick="openDelete('${p.projectName.replace(/'/g,"\'")}')">🗑</button>
    </div>
  </div>`;
}

  const submitted = rows.length > 0;

  return `
  <div class="proj-card-list" id="pcard_${slug}"
    draggable="true"

    ondragend="endDrag('${p.projectName.replace(/'/g,"\'")}')" >

      <div class="pcl-name">${p.projectName}</div>
      <div class="pcl-meta">${p.location||'—'} · ${dateStr} · SC: ${p.scName||'—'} · ${qty} items</div>
    </div>
    <div class="pcl-right">
      <div class="proj-status-badge ${submitted?'badge-submitted':'badge-pending'}">${submitted?'Submitted':'Pending'}</div>
      <button class="pact" onclick="viewProject('${p.projectName.replace(/'/g,"\'")}')">👁 View</button>
      <button class="pact" onclick="editProject('${p.projectName.replace(/'/g,"\'")}')">✏ Edit</button>
      <button class="pact" onclick="copyLink('${p.projectName.replace(/'/g,"\'")}')">📋 Link</button>
      <button class="pact" onclick="exportCSV('${p.projectName.replace(/'/g,"\'")}')">📊 Excel</button>
      <button class="pact danger" onclick="openDelete('${p.projectName.replace(/'/g,"\'")}')">🗑</button>

// ── VIEW PROJECT ──────────────────────────────────────────────
function viewProject(name) {
  currentViewProject = name;
  const rows = allRows.filter(r=>r.projectName===name);
  const p    = allProjects.find(x=>x.projectName===name);
  document.getElementById('viewModalTitle').textContent = name;

  if (rows.length === 0) {
    document.getElementById('viewModalBody').innerHTML =
      '<p style="text-align:center;color:var(--ink3);padding:30px;">No inventory submitted yet.</p>';
  } else {
    document.getElementById('viewModalBody').innerHTML = `
      <table class="inv-table">
        <thead><tr>
          <th style="text-align:left;width:22%">Item</th>
          <th style="width:7%">#</th>
          <th style="width:28%">Photo</th>
          <th style="width:16%">Method</th>
          <th>Notes</th>
        </tr></thead>
        <tbody>
          ${rows.map((r,i) => `<tr>
            <td>${r.itemType||'—'}</td>
            <td style="font-family:var(--mono);font-size:15px;font-weight:700">${r.quantity||0}</td>
            <td style="text-align:center">
              ${parseInt(r.photoCount)>0
                ? `<span style="font-size:12px;color:var(--ink3)">📷 ${r.photoCount} photo${r.photoCount>1?'s':''}</span>`
                : '<span style="font-size:11px;color:var(--ink4);font-style:italic">No picture</span>'}
            </td>
            <td>
              <select class="method-sel ${r.condition?'m-'+(METHOD_MAP[r.condition]||''):''}"
                onchange="saveMethod('${p?.sheetName||''}', ${i}, this)">
                <option value="">—</option>
                ${METHODS.map(m=>`<option value="${m}"${r.condition===m?' selected':''}>${m}</option>`).join('')}
              </select>
            </td>
            <td style="text-align:left;font-size:12px">${r.notes||''}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }
  document.getElementById('viewModal').classList.add('show');
}

function closeViewModal() { document.getElementById('viewModal').classList.remove('show'); }

// ── EDIT PROJECT ──────────────────────────────────────────────
function editProject(name) {
  const p = allProjects.find(x=>x.projectName===name);
  if (!p) return;
  editingProject = name;
  document.getElementById('projModalTitle').textContent = 'Edit Project';
  document.getElementById('projSubmitBtn').textContent  = 'Save Changes';
  document.getElementById('fName').value     = p.projectName||'';
  document.getElementById('fId').value       = p.projectId||'';
  document.getElementById('fDate').value     = p.startDate ? p.startDate.split('T')[0] : '';
  document.getElementById('fLocation').value = p.location||'';
  document.getElementById('fScName').value   = p.scName||'';
  document.getElementById('fScEmail').value  = p.scEmail||'';
  document.getElementById('fFolder').value   = p.folder||'';
  document.getElementById('projModal').classList.add('show');
}

// ── DELETE PROJECT ────────────────────────────────────────────
function openDelete(name) {
  deletingProject = name;
  document.getElementById('deleteProjName').textContent = name;
  document.getElementById('deleteModal').classList.add('show');
}
function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('show'); }
function confirmDelete() {
  if (!deletingProject) return;
  // Delete from Google Sheet
  const fd = new FormData();
  fd.append('data', JSON.stringify({ _action: 'deleteProject', projectName: deletingProject }));
  fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: fd });
  // Remove from local state
  allProjects = allProjects.filter(p=>p.projectName!==deletingProject);
  saveProjectFolders();
  renderFolders();
  renderProjects();
  closeDeleteModal();
  showToast('Project deleted');
}

// ── NEW PROJECT ───────────────────────────────────────────────
function openNewProject() {
  editingProject = null;
  document.getElementById('projModalTitle').textContent = 'New Project';
  document.getElementById('projSubmitBtn').textContent  = 'Create & Email SC →';
  ['fName','fId','fLocation','fScName','fScEmail'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('fFolder').value = '';
  document.getElementById('projModal').classList.add('show');
  setTimeout(()=>document.getElementById('fName').focus(),100);
}

function closeProjModal() {
  document.getElementById('projModal').classList.remove('show');
  editingProject = null;
}

async function submitProject() {
  const name    = document.getElementById('fName').value.trim();
  const id      = document.getElementById('fId').value.trim();
  const date    = document.getElementById('fDate').value;
  const loc     = document.getElementById('fLocation').value.trim();
  const scName  = document.getElementById('fScName').value.trim();
  const scEmail = document.getElementById('fScEmail').value.trim();
  const folder  = document.getElementById('fFolder').value;

  if (!name)    return showToast('Enter a project name','err');
  if (!scName)  return showToast('Enter SC name','err');
  if (editingProject) {
    // Edit mode — update local
    const p = allProjects.find(x=>x.projectName===editingProject);
    if (p) { p.projectName=name; p.projectId=id; p.startDate=date; p.location=loc; p.scName=scName; p.scEmail=scEmail; p.folder=folder; }
    saveProjectFolders();
    renderFolders();
    renderProjects();
    closeProjModal();
    showToast('Project updated');
    return;
  }

  if (!scEmail||!scEmail.includes('@')) return showToast('Enter valid SC email','err');

  const token = generateToken();
  const link  = FORM_BASE +
    '?project=' + encodeURIComponent(id) +
    '&name='    + encodeURIComponent(name) +
    '&location='+ encodeURIComponent(loc) +
    '&date='    + encodeURIComponent(date) +
    '&sc='      + encodeURIComponent(scName) +
    '&token='   + token;

  document.getElementById('projSubmitBtn').disabled = true;
  document.getElementById('spinner').classList.add('show');

  try {
    const fd = new FormData();
    fd.append('data', JSON.stringify({
      _action:'createProject', projectName:name, projectId:id,
      floorArea:loc, startDate:date, scName, scEmail, formLink:link, token
    }));
    await fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body:fd});
    document.getElementById('spinner').classList.remove('show');
    closeProjModal();
    showToast('Project created! Email sent to ' + scEmail);
    setTimeout(loadData, 2000);
  } catch(err) {
    document.getElementById('spinner').classList.remove('show');
    document.getElementById('projSubmitBtn').disabled = false;
    showToast('Error: ' + err.message,'err');
  }
}

function generateToken() {
  const c='ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
  let t='';for(let i=0;i<24;i++)t+=c[Math.floor(Math.random()*c.length)];return t;
}

// ── COPY LINK ─────────────────────────────────────────────────
function copyLink(name) {
  const p = allProjects.find(x=>x.projectName===name);
  if (!p?.formLink) { showToast('No link available','err'); return; }
  navigator.clipboard.writeText(p.formLink).then(()=>showToast('Link copied!'));
}
function copyLinkCurrent() { if (currentViewProject) copyLink(currentViewProject); }

// ── EXPORT CSV ────────────────────────────────────────────────
function exportCSV(name) {
  const rows = allRows.filter(r=>r.projectName===name);
  if (!rows.length) { showToast('No inventory data yet','err'); return; }
  const headers = ['Item','Quantity','Method','Notes','Subcontractor','Date','Location'];
  const csv = [headers.join(','), ...rows.map(r=>[
    `"${r.itemType||''}"`, r.quantity||0, `"${r.condition||''}"`,
    `"${(r.notes||'').replace(/"/g,'""')}"`, `"${r.scName||''}"`,
    r.timestamp?new Date(r.timestamp).toLocaleDateString('en-CA'):'',
    `"${r.floorArea||''}"`
  ].join(','))].join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `NATTIQ_${name.replace(/[^a-zA-Z0-9]/g,'_')}.csv`;
  a.click();
  showToast('Downloaded');
}

// ── SAVE METHOD ───────────────────────────────────────────────
async function saveMethod(sheetName, idx, sel) {
  const val = sel.value;
  sel.className = 'method-sel' + (val&&METHOD_MAP[val]?' m-'+METHOD_MAP[val]:'');
  const fd = new FormData();
  fd.append('data', JSON.stringify({_action:'updateMethod', sheetName, rowIndex:idx, method:val}));
  await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:fd});
  showToast('Method saved');
  // Update local
  const rows = allRows.filter(r=>r.projectName===currentViewProject);
  if (rows[idx]) rows[idx].condition = val;
  updateStats();
}

// ── VIEW TOGGLE ───────────────────────────────────────────────
function setView(v) {
  viewMode = v;
  document.getElementById('gridBtn').classList.toggle('active', v==='grid');
  document.getElementById('listBtn').classList.toggle('active', v==='list');
  renderProjects();
}

// ── FOLDER SELECT ─────────────────────────────────────────────
function populateFolderSelect() {
  const sel = document.getElementById('fFolder');
  sel.innerHTML = '<option value="">— No folder —</option>' +
    folders.map(f=>`<option value="${f.id}">${f.name}</option>`).join('');
}

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg,type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(type?' '+type:'');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ── INIT ──────────────────────────────────────────────────────
