<style>
:root{
  --teal:#2fa8bc;--teal-d:#1a7d8f;--teal-bg:#eaf7fa;--teal-mid:#c2eaf0;
  --ink:#181818;--ink2:#3d3d3d;--ink3:#7a7a7a;--ink4:#b0b0b0;
  --border:#d4d4d4;--border2:#e8e8e8;
  --paper:#fff;--paper2:#f8f8f6;
  --green:#1a7a3a;--green-bg:#eaf5ed;
  --red:#c0392b;--red-bg:#fdf0ee;
  --amber:#b7650a;--amber-bg:#fdf4e3;
  --blue:#1a5fa8;--blue-bg:#e8f0fb;
  --r:6px;--mono:'IBM Plex Mono',monospace;--body:'Inter',sans-serif;--cond:'Inter Tight',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{font-family:var(--body);background:var(--paper2);color:var(--ink);min-height:100vh;}

.hdr{
  background:#111;border-bottom:3px solid var(--teal);
  padding:10px 24px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.15);
}
.hdr-left{display:flex;align-items:center;gap:16px;}
.hdr-logo img{height:34px;display:block;}
.hdr-divider{width:1px;height:28px;background:rgba(255,255,255,0.15);}
.hdr-title{font-family:var(--cond);font-size:16px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.7);}
.hdr-btn{
  font-family:var(--body);font-size:13px;font-weight:600;
  border:1.5px solid rgba(255,255,255,0.2);border-radius:var(--r);
  padding:8px 16px;background:transparent;color:rgba(255,255,255,0.8);
  cursor:pointer;transition:all 0.15s;white-space:nowrap;
}
.hdr-btn:hover{background:rgba(255,255,255,0.08);color:#fff;}
.hdr-btn.primary{background:var(--teal);border-color:var(--teal);color:#fff;}
.hdr-btn.primary:hover{background:var(--teal-d);}

.page{padding:24px;max-width:1100px;margin:0 auto;}

/* Stats */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px 20px;}
.stat-num{font-family:var(--mono);font-size:30px;font-weight:500;color:var(--ink);line-height:1;}
.stat-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink3);margin-top:6px;}
.stat-card.hl .stat-num{color:var(--teal-d);}

/* Section */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-title{font-family:var(--cond);font-size:20px;font-weight:700;color:var(--ink);}

/* Project cards */
.projects-list{display:flex;flex-direction:column;gap:12px;}
.proj-card{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:box-shadow 0.15s;}
.proj-card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.08);}
.proj-card-hdr{
  display:grid;grid-template-columns:1fr auto;
  align-items:center;padding:16px 20px;cursor:pointer;gap:12px;
}
.proj-info{display:flex;flex-direction:column;gap:4px;}
.proj-name{font-size:17px;font-weight:700;color:var(--ink);}
.proj-meta{font-family:var(--mono);font-size:11px;color:var(--ink3);}
.proj-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.proj-status{
  font-family:var(--mono);font-size:10px;font-weight:500;
  padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.08em;
}
.proj-status.active{background:var(--green-bg);color:var(--green);}
.proj-status.pending{background:var(--amber-bg);color:var(--amber);}
.proj-count{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--ink2);}
.proj-chevron{font-size:12px;color:var(--ink3);transition:transform 0.2s;}
.proj-card.open .proj-chevron{transform:rotate(180deg);}

/* Project actions bar */
.proj-actions{
  display:none;padding:10px 20px;
  background:var(--paper2);border-top:1px solid var(--border2);
  gap:8px;flex-wrap:wrap;align-items:center;
}
.proj-card.open .proj-actions{display:flex;}
.action-btn{
  font-family:var(--body);font-size:12px;font-weight:600;
  border:1.5px solid var(--border);border-radius:var(--r);
  padding:7px 14px;background:#fff;color:var(--ink2);
  cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:5px;
  white-space:nowrap;
}
.action-btn:hover{border-color:var(--teal);color:var(--teal-d);}
.sc-link-box{
  flex:1;font-family:var(--mono);font-size:11px;
  background:#fff;border:1px solid var(--border);border-radius:var(--r);
  padding:7px 12px;color:var(--ink3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  min-width:0;
}

/* Inventory table */
.proj-table-wrap{display:none;overflow-x:auto;}
.proj-card.open .proj-table-wrap{display:block;}
.proj-table{width:100%;border-collapse:collapse;font-size:14px;}
.proj-table th{
  font-family:var(--cond);font-size:13px;font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;
  background:var(--teal-bg);color:var(--teal-d);
  border:1px solid var(--teal-mid);padding:10px 12px;text-align:center;white-space:nowrap;
}
.proj-table th:first-child{text-align:left;}
.proj-table td{border:1px solid var(--border);padding:10px 12px;vertical-align:middle;text-align:center;background:#fff;}
.proj-table tr:nth-child(even) td{background:var(--paper2);}
.proj-table td:first-child{text-align:left;font-weight:600;font-size:15px;}
.td-qty{font-family:var(--mono);font-size:16px;font-weight:700;}
.no-photo{font-size:12px;color:var(--ink4);font-style:italic;}
.td-photos{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;}
.td-photo{width:64px;height:64px;object-fit:cover;border:1px solid var(--border);cursor:pointer;}
.method-sel{
  font-family:var(--body);font-size:13px;font-weight:500;
  border:1.5px solid var(--border);border-radius:var(--r);
  background:var(--paper2);color:var(--ink3);
  padding:6px 8px;width:120px;outline:none;cursor:pointer;
  -webkit-appearance:none;text-align:center;transition:all 0.15s;
}
.method-sel.m-reuse  {background:#eaf5ed;border-color:#1a7a3a;color:#1a7a3a;}
.method-sel.m-dispose{background:#fdf0ee;border-color:#c0392b;color:#c0392b;}
.method-sel.m-donate {background:#e8f0fb;border-color:#1a5fa8;color:#1a5fa8;}
.method-sel.m-store  {background:#fdf4e3;border-color:#b7650a;color:#b7650a;}

/* Empty */
.empty-dash{padding:60px;text-align:center;color:var(--ink3);}
.empty-icon{font-size:48px;opacity:0.2;margin-bottom:12px;}
.empty-text{font-size:15px;}

/* NEW PROJECT MODAL */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.5);z-index:500;
  align-items:center;justify-content:center;padding:20px;
}
.modal-bg.show{display:flex;}
.modal{
  background:#fff;border-radius:14px;
  width:100%;max-width:480px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  overflow:hidden;
}
.modal-hdr{
  background:#111;padding:20px 24px;
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-family:var(--cond);font-size:18px;font-weight:700;color:#fff;letter-spacing:0.04em;}
.modal-close{background:none;border:none;color:rgba(255,255,255,0.6);font-size:22px;cursor:pointer;}
.modal-body{padding:24px;display:flex;flex-direction:column;gap:16px;}
.field{display:flex;flex-direction:column;gap:6px;}
.field-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink3);}
.field-input{
  font-family:var(--body);font-size:15px;
  border:1.5px solid var(--border);border-radius:var(--r);
  padding:11px 14px;outline:none;transition:border-color 0.15s;color:var(--ink);
}
.field-input:focus{border-color:var(--teal);}
.field-input::placeholder{color:#bbb;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border2);display:flex;gap:10px;justify-content:flex-end;}
.btn-cancel{background:transparent;border:1.5px solid var(--border);border-radius:var(--r);padding:10px 20px;font-family:var(--body);font-size:14px;cursor:pointer;color:var(--ink2);}
.btn-create{background:var(--teal);border:none;border-radius:var(--r);padding:10px 24px;font-family:var(--cond);font-size:15px;font-weight:700;cursor:pointer;color:#fff;letter-spacing:0.04em;transition:background 0.15s;}
.btn-create:hover{background:var(--teal-d);}
.btn-create:disabled{background:var(--border);cursor:not-allowed;}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#111;color:#fff;padding:10px 20px;border-radius:var(--r);
  font-family:var(--mono);font-size:12px;opacity:0;transition:opacity 0.25s;
  pointer-events:none;white-space:nowrap;z-index:999;border-left:3px solid var(--teal);
}
.toast.show{opacity:1;}
.toast.err{border-left-color:var(--red);}

/* Spinner */
.spinner-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:400;align-items:center;justify-content:center;}
.spinner-ov.show{display:flex;}
.spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,0.2);border-top-color:var(--teal);border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:999;align-items:center;justify-content:center;}
.lightbox.show{display:flex;}
.lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:4px;}
.lb-close{position:absolute;top:16px;right:20px;color:#fff;font-size:30px;cursor:pointer;background:none;border:none;}

@media(max-width:768px){
  .stats-bar{grid-template-columns:1fr 1fr;}
  .page{padding:14px;}
  .two-col{grid-template-columns:1fr;}
}
</style>
</head>

    <div class="modal-hdr">
      <div class="modal-title">Create New Project</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <div class="field-label">Project Name</div>
        <input class="field-input" id="newProjName" placeholder="e.g. BMO Hastings & Willingdon" autocomplete="off"/>
      </div>
      <div class="two-col">
        <div class="field">
          <div class="field-label">Project ID</div>
          <input class="field-input" id="newProjId" placeholder="e.g. NTQ-2025-041" autocomplete="off"/>
        </div>
        <div class="field">
          <div class="field-label">Start Date</div>
          <input class="field-input" id="newProjDate" type="date"/>
        </div>
      </div>
      <div class="field">
        <div class="field-label">Location</div>
        <input class="field-input" id="newProjLocation" placeholder="e.g. 4454 Hastings St, Burnaby, BC" autocomplete="off"/>
      </div>
      <div class="two-col">
        <div class="field">
          <div class="field-label">Subcontractor Name</div>
          <input class="field-input" id="newScName" placeholder="Full name" autocomplete="off"/>
        </div>
        <div class="field">
          <div class="field-label">Subcontractor Email</div>
          <input class="field-input" id="newScEmail" type="email" placeholder="sc@email.com" autocomplete="off"/>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-create" id="createBtn" onclick="createProject()">Create & Email SC →</button>
    </div>
  </div>
</div>

<!-- Toast / Spinner / Lightbox -->
<div class="toast" id="toast"></div>
<div class="spinner-ov" id="spinner"><div class="spinner"></div></div>
<div class="lightbox" id="lightbox" onclick="closeLb()">
  <button class="lb-close">✕</button>
  <img id="lbImg" src="" alt=""/>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxUMku6OxFRrjSLq86Up6PlQ_hp6pqDb7lt3X1ieRZLPv61Qy067e6Jp8PwgfA-AjpSQQ/exec';
const FORM_BASE  = 'https://monishtest2-svg.github.io/nattiq/nattiq-v8.html';
const METHOD_MAP = {'Re-use':'reuse','Disposal':'dispose','Donate':'donate','Store':'store'};

let allProjects = [];

// ── LOAD DATA ────────────────────────────────────────────────
async function loadData() {
  try {
    const res  = await fetch(SCRIPT_URL + '?action=getProjects');
    const json = await res.json();
    if (json.status !== 'ok') throw new Error(json.message);
    allProjects = json.projects || [];

    // Load inventory for each project
    const rowRes  = await fetch(SCRIPT_URL + '?action=getData');
    const rowJson = await rowRes.json();
    const rows    = rowJson.rows || [];

    renderDashboard(allProjects, rows);
    document.getElementById('lastRefresh').textContent =
      'Updated ' + new Date().toLocaleTimeString();
  } catch(err) {
    document.getElementById('projectsList').innerHTML =
      `<div class="empty-dash"><div class="empty-icon">⚠</div><div class="empty-text" style="color:#c0392b">Could not load data.<br><small>${err.message}</small></div></div>`;
  }
}

// ── RENDER ────────────────────────────────────────────────────
function renderDashboard(projects, rows) {
  const totalItems   = rows.reduce((s,r)=>s+(parseInt(r.quantity)||0),0);
  const pending      = rows.filter(r=>!r.condition||r.condition==='').length;

  document.getElementById('statProjects').textContent = projects.length;
  document.getElementById('statItems').textContent    = totalItems;
  document.getElementById('statTypes').textContent    = rows.length;
  document.getElementById('statPending').textContent  = pending;

  if (projects.length === 0) {
    document.getElementById('projectsList').innerHTML =
      `<div class="empty-dash"><div class="empty-icon">📋</div><div class="empty-text">No projects yet. Click <b>+ New Project</b> to create one.</div></div>`;
    return;
  }

  // Group rows by project
  const rowsByProject = {};
  rows.forEach(r => {
    if (!rowsByProject[r.projectName]) rowsByProject[r.projectName] = [];
    rowsByProject[r.projectName].push(r);
  });

  document.getElementById('projectsList').innerHTML = projects.map((p,pi) => {
    const projRows = rowsByProject[p.projectName] || [];
    const totalQty = projRows.reduce((s,r)=>s+(parseInt(r.quantity)||0),0);
    const dateStr  = p.startDate ? new Date(p.startDate).toLocaleDateString('en-CA') : '—';
    const scNames  = [...new Set(projRows.map(r=>r.scName).filter(Boolean))].join(', ') || p.scName || '—';
    const link     = p.formLink || '';
    const slug     = 'proj_' + pi;

    return `
    <div class="proj-card" id="${slug}">
      <div class="proj-card-hdr" onclick="toggleProj('${slug}')">
        <div class="proj-info">
          <div class="proj-name">${p.projectName}</div>
          <div class="proj-meta">${p.location||'—'} &nbsp;·&nbsp; ${dateStr} &nbsp;·&nbsp; SC: ${scNames}</div>
        </div>
        <div class="proj-right">
          <div class="proj-status ${projRows.length>0?'active':'pending'}">${projRows.length>0?'Submitted':'Pending'}</div>
          <div class="proj-count">${totalQty} items</div>
          <div class="proj-chevron">▾</div>
        </div>
      </div>
      <div class="proj-actions">
        <div class="sc-link-box" id="link_${pi}">${link || 'No link — recreate project to generate'}</div>
        <button class="action-btn" onclick="copyLink(${pi})">📋 Copy Link</button>
        <button class="action-btn" onclick="exportCSV('${p.projectName}')">📊 Excel</button>
        <button class="action-btn" onclick="printProject('${p.projectName}')">🖨 Print</button>
      </div>
      <div class="proj-table-wrap">
        ${projRows.length === 0
          ? '<div style="padding:30px;text-align:center;color:#b0b0b0;font-size:14px;">No inventory submitted yet.</div>'
          : `<table class="proj-table">
              <thead><tr>
                <th style="width:20%;text-align:left">ITEM</th>
                <th style="width:6%">#</th>
                <th style="width:28%">PHOTO</th>
                <th style="width:16%">METHOD</th>
                <th style="width:20%">NOTES</th>
                <th style="width:10%">SC</th>
              </tr></thead>
              <tbody>
                ${projRows.map((row,ri) => `
                  <tr>
                    <td>${row.itemType||'—'}</td>
                    <td><div class="td-qty">${row.quantity||0}</div></td>
                    <td>
                      ${parseInt(row.photoCount)>0
                        ? `<div class="no-photo">📷 ${row.photoCount} photo${row.photoCount>1?'s':''}</div>`
                        : '<div class="no-photo">No picture</div>'}
                    </td>
                    <td>
                      <select class="method-sel ${row.condition?'m-'+(METHOD_MAP[row.condition]||''):''}"
                        onchange="saveMethod('${p.sheetName}',${ri},this)">
                        <option value="">—</option>
                        ${['Re-use','Disposal','Donate','Store'].map(m=>
                          `<option value="${m}"${row.condition===m?' selected':''}>${m}</option>`
                        ).join('')}
                      </select>
                    </td>
                    <td style="text-align:left;font-size:13px;">${row.notes||''}</td>
                    <td style="font-family:var(--mono);font-size:11px;color:var(--ink3)">${row.scName||'—'}</td>
                  </tr>`).join('')}
              </tbody>
            </table>`
        }
      </div>
    </div>`;
  }).join('');

  // Store links in window for copy
  window._projLinks = {};
  projects.forEach((p,i) => { window._projLinks[i] = p.formLink || ''; });
}

function toggleProj(slug) {
  document.getElementById(slug).classList.toggle('open');
}

// ── COPY LINK ─────────────────────────────────────────────────
function copyLink(i) {
  const link = window._projLinks[i];
  if (!link) { showToast('No link available', 'err'); return; }
  navigator.clipboard.writeText(link).then(() => showToast('Link copied!'));
}

// ── SAVE METHOD ───────────────────────────────────────────────
async function saveMethod(sheetName, rowIndex, sel) {
  const val = sel.value;
  sel.className = 'method-sel' + (val && METHOD_MAP[val] ? ' m-'+METHOD_MAP[val] : '');
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ _action:'updateMethod', sheetName, rowIndex, method:val })
    });
    showToast('Method saved');
  } catch(e) { showToast('Save failed', 'err'); }
}

// ── EXPORT CSV ────────────────────────────────────────────────
function exportCSV(projName) {
  const res  = fetch(SCRIPT_URL + '?action=getData&project=' + encodeURIComponent(projName));
  // Build from cached data
  const rowsByProject = {};
  // Re-fetch fresh
  fetch(SCRIPT_URL + '?action=getData')
    .then(r=>r.json())
    .then(json => {
      const rows = (json.rows||[]).filter(r=>r.projectName===projName);
      const headers = ['Item','Quantity','Method','Notes','Subcontractor','Date','Location'];
      const csvRows = rows.map(r => [
        `"${r.itemType||''}"`, r.quantity||0,
        `"${r.condition||''}"`, `"${(r.notes||'').replace(/"/g,'""')}"`,
        `"${r.scName||''}"`,
        r.timestamp ? new Date(r.timestamp).toLocaleDateString('en-CA') : '',
        `"${r.floorArea||''}"`
      ]);
      const csv = [headers.join(','), ...csvRows.map(r=>r.join(','))].join('\n');
      const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url;
      a.download = `NATTIQ_${projName.replace(/[^a-zA-Z0-9]/g,'_')}_Inventory.csv`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('Excel file downloaded');
    });
}

// ── PRINT ─────────────────────────────────────────────────────
function printProject(projName) {
  window.print();
}

// ── CREATE PROJECT ────────────────────────────────────────────
async function createProject() {
  const name     = document.getElementById('newProjName').value.trim();
  const id       = document.getElementById('newProjId').value.trim();
  const date     = document.getElementById('newProjDate').value;
  const location = document.getElementById('newProjLocation').value.trim();
  const scName   = document.getElementById('newScName').value.trim();
  const scEmail  = document.getElementById('newScEmail').value.trim();

  if (!name)    return showToast('Enter a project name', 'err');
  if (!scName)  return showToast('Enter subcontractor name', 'err');
  if (!scEmail || !scEmail.includes('@')) return showToast('Enter a valid SC email', 'err');

  // Generate unique token
  const token = generateToken();

  // Build SC form link
  const link = FORM_BASE +
    '?project=' + encodeURIComponent(id) +
    '&name='    + encodeURIComponent(name) +
    '&location='+ encodeURIComponent(location) +
    '&date='    + encodeURIComponent(date) +
    '&sc='      + encodeURIComponent(scName) +
    '&token='   + token;

  document.getElementById('createBtn').disabled = true;
  document.getElementById('spinner').classList.add('show');

  try {
    // Save project to sheet + send email via Apps Script
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({
        _action:   'createProject',
        projectName: name,
        projectId:   id,
        floorArea:   location,
        startDate:   date,
        scName,
        scEmail,
        formLink:    link,
        token,
      })
    });

    document.getElementById('spinner').classList.remove('show');
    closeModal();
    showToast('Project created! Email sent to ' + scEmail);
    setTimeout(loadData, 1500);
  } catch(err) {
    document.getElementById('spinner').classList.remove('show');
    document.getElementById('createBtn').disabled = false;
    showToast('Error: ' + err.message, 'err');
  }
}

function generateToken() {
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
  let token = '';
  for (let i = 0; i < 24; i++) token += chars[Math.floor(Math.random() * chars.length)];
  return token;
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modalBg').classList.add('show');
  document.getElementById('newProjDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('createBtn').disabled = false;
  setTimeout(() => document.getElementById('newProjName').focus(), 100);
}
function closeModal() {
  document.getElementById('modalBg').classList.remove('show');
  ['newProjName','newProjId','newProjLocation','newScName','newScEmail'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

// ── LIGHTBOX ──────────────────────────────────────────────────
function openLb(src) { document.getElementById('lbImg').src=src; document.getElementById('lightbox').classList.add('show'); }
function closeLb() { document.getElementById('lightbox').classList.remove('show'); }

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── INIT ──────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
